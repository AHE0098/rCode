name: R CI

on:
  push:
  pull_request:

jobs:
  test-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        run: |
          Rscript -e "install.packages(c('here','jsonlite','yaml','testthat'), repos='https://cloud.r-project.org')"

      - name: Run tests
        run: |
          Rscript -e "testthat::test_dir('tests/testthat')"

      - name: Run entrypoint
        run: |
          Rscript scripts/specificR_run.R --config config/example_config.yml

      - name: Verify run manifest exists
        run: |
          test -f out/run_manifest.json
